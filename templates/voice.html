<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Age & Emotion Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #FFD93D 0%, #FFA502 50%, #FF6B6B 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container { position: relative; z-index: 1; max-width: 800px; }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .header-subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 400;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeInUp 0.6s ease-out;
            margin-bottom: 30px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #FFA502;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-label {
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .form-control {
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            padding: 12px 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #FFA502;
            box-shadow: 0 0 0 3px rgba(255, 165, 2, 0.1);
        }

        .form-text {
            color: #999;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FFD93D, #FFA502);
            color: #333;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 15px;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 165, 2, 0.3);
            color: #333;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(255, 165, 2, 0.05), rgba(255, 107, 107, 0.05));
            border-radius: 12px;
            border-left: 4px solid #FFA502;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            color: #2d3436;
            font-weight: 500;
            border-bottom: 1px solid rgba(255, 165, 2, 0.1);
        }

        .result-item:last-child { border-bottom: none; }

        .result-value {
            color: #FFA502;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .alert {
            border-radius: 12px;
            border: none;
            margin-bottom: 20px;
        }

        .back-button {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 28px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.6);
            color: white;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ Voice Age & Emotion</h1>
            <p class="header-subtitle">Upload audio to detect gender, age, and emotion from voice</p>
        </div>

        <div class="card">
            <h3><i class="fas fa-upload"></i> Audio Upload</h3>
            <form method="POST" enctype="multipart/form-data">
                <label class="form-label">Select Audio File:</label>
                <input type="file" name="audio" class="form-control" accept="audio/*" required>
                <div class="form-text"><i class="fas fa-info-circle"></i> Supports WAV, MP3, and other audio formats</div>
                <button type="submit" class="btn-submit">
                    <i class="fas fa-waveform-lines"></i> Analyze Voice
                </button>
            </form>

            {% if result %}
                <div class="result-box">
                    <div class="result-item">
                        <span><i class="fas fa-venus-mars"></i> Gender:</span>
                        <span class="result-value">{{ gender }}</span>
                    </div>
                    {% if age %}
                        <div class="result-item">
                            <span><i class="fas fa-birthday-cake"></i> Age:</span>
                            <span class="result-value">{{ age }}</span>
                        </div>
                    {% endif %}
                    {% if emotion %}
                        <div class="result-item">
                            <span><i class="fas fa-smile"></i> Emotion:</span>
                            <span class="result-value">{{ emotion }}</span>
                        </div>
                    {% endif %}
                </div>
            {% endif %}
        </div>

        <center>
            <a href="/" class="back-button">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </center>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
